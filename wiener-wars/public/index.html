<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Wiener Wars 🌭</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌭</text></svg>" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap');
:root{
  --paper:#fdf2d8; --paper2:#f7e3b6; --cream:#fffaf0;
  --ketchup:#d4321f; --ketchup-dk:#9e210e;
  --mustard:#f4b01a; --mustard-dk:#cf8e07;
  --ink:#2a1c12; --ink-soft:#7a6346; --green:#2f8f4e;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:'Hanken Grotesk',sans-serif;color:var(--ink);min-height:100vh;
  background-color:var(--paper);background-image:radial-gradient(var(--paper2) 1.6px,transparent 1.7px);
  background-size:17px 17px;padding-bottom:96px;}
.display{font-family:'Anton',sans-serif;letter-spacing:.02em;line-height:.95;}
.wrap{max-width:460px;margin:0 auto;padding:0 16px;}
.card{background:var(--cream);border:3px solid var(--ink);border-radius:18px;box-shadow:6px 6px 0 var(--ink);}
.btn{font-family:'Anton',sans-serif;letter-spacing:.04em;cursor:pointer;border:3px solid var(--ink);
  border-radius:14px;background:var(--ketchup);color:var(--cream);box-shadow:4px 4px 0 var(--ink);
  transition:transform .05s,box-shadow .05s;text-transform:uppercase;font-size:18px;padding:14px;width:100%;}
.btn:active{transform:translate(4px,4px);box-shadow:0 0 0 var(--ink);}
.btn:disabled{opacity:.45;}
.btn.mustard{background:var(--mustard);color:var(--ink);}
.btn.ghost{background:var(--cream);color:var(--ink);}
.input{font-family:'Hanken Grotesk';font-weight:600;border:3px solid var(--ink);border-radius:12px;
  background:#fff;color:var(--ink);outline:none;width:100%;padding:12px 14px;font-size:16px;}
.input:focus{box-shadow:0 0 0 3px var(--mustard);}
.chip{border:2.5px solid var(--ink);border-radius:999px;}
.banner{height:14px;background:repeating-linear-gradient(45deg,var(--ketchup) 0 22px,var(--mustard) 22px 44px);border-bottom:3px solid var(--ink);}
.dot{width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--ink);display:inline-block;}
.tab{font-family:'Anton';font-size:13px;letter-spacing:.03em;color:var(--ink-soft);cursor:pointer;background:none;border:none;padding:6px 4px;text-transform:uppercase;}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes slide{from{transform:translateY(-14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes grow{from{width:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.pop{animation:pop .35s cubic-bezier(.2,1.3,.5,1) both;}
.toast{animation:slide .35s ease both;}
.barfill{animation:grow .7s cubic-bezier(.3,1,.4,1) both;}
.live{animation:pulse 1.6s ease-in-out infinite;}
.center{display:flex;align-items:center;justify-content:center;}
.row{display:flex;align-items:center;}
.hide{display:none !important;}
nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--cream);border-top:3px solid var(--ink);}
.navinner{max-width:460px;margin:0 auto;display:flex;align-items:center;justify-content:space-around;padding:8px 10px 12px;}
.navbtn{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
  color:var(--ink-soft);font-family:'Anton';font-size:11px;letter-spacing:.03em;width:64px;}
.navbtn.active{color:var(--ketchup);}
.fab{width:62px;height:62px;border-radius:50%;margin-top:-26px;display:flex;align-items:center;justify-content:center;font-size:34px;padding:0;}
#toasts{position:fixed;top:10px;left:0;right:0;z-index:50;display:flex;flex-direction:column;align-items:center;gap:8px;padding:0 12px;pointer-events:none;}
.modal{position:fixed;inset:0;z-index:60;background:rgba(42,28,18,.55);display:flex;align-items:flex-end;justify-content:center;padding:0;}
.sheet{width:100%;max-width:460px;background:var(--cream);border:3px solid var(--ink);border-radius:18px 18px 0 0;padding:18px 16px 26px;max-height:82vh;overflow:auto;animation:slide .25s ease both;}
</style>
</head>
<body>
<div id="app"></div>
<div id="toasts"></div>
<div id="modal"></div>

<script>
// ----------------------------- data layer (talks to local server) -----------------------------
const TOKEN = () => localStorage.getItem("ww_token") || "";
async function api(p, method = "GET", body) {
  const res = await fetch("/api/" + p, {
    method,
    headers: { "Content-Type": "application/json", "x-token": TOKEN() },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { signOut(); throw new Error("session expired"); }
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

// ----------------------------- helpers -----------------------------
const EMOJIS = ["🦅","🐻","🐺","🦖","🔥","⚡","🐷","🦈","👑","💪","🚀","🐉","🍔","🦬","😈","🤠"];
const COLORS = ["#d4321f","#f4b01a","#2f8f4e","#2563c9","#8a3ffc","#e0518a","#10968f","#e2711d"];
const RANK_TINT = ["#f4b01a","#cfd2d6","#cd853f"];
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const niceDate = (s) => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d).toLocaleDateString(undefined,{month:"short",day:"numeric"}); };
const ago = (ts) => { const s=Math.floor((Date.now()-ts)/1000); if(s<60)return "just now"; const m=Math.floor(s/60); if(m<60)return m+"m ago"; const h=Math.floor(m/60); if(h<24)return h+"h ago"; return Math.floor(h/24)+"d ago"; };
const hhmm = (ts) => new Date(ts).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
const ls = { get:(k)=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}, set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}} };

// Heavy client-side compression so proof photos stay tiny on the droplet's disk.
function compress(file){return new Promise((res)=>{const r=new FileReader();r.onload=(e)=>{const img=new Image();img.onload=()=>{const max=440;let{width:w,height:h}=img;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}const c=document.createElement("canvas");c.width=Math.round(w);c.height=Math.round(h);const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,w,h);res(c.toDataURL("image/jpeg",0.42));};img.onerror=()=>res(null);img.src=e.target.result;};r.onerror=()=>res(null);r.readAsDataURL(file);});}

function toast(emoji,msg){const el=document.createElement("div");el.className="toast card";el.style.cssText="width:100%;max-width:440px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:4px 4px 0 var(--ink)";el.innerHTML=`<span style="font-size:22px">${emoji}</span><span style="font-weight:700;font-size:15px">${esc(msg)}</span>`;$("toasts").appendChild(el);setTimeout(()=>el.remove(),5200);}

// ----------------------------- state -----------------------------
const state = { view:"board", me:ls.get("ww_me"), players:{}, pics:[], events:[], online:0 };
const prevTotals = {}; let prevLeader = null; let started = false;
const totalOf = (p)=> p?.total ?? Object.values(p?.days||{}).reduce((a,b)=>a+b,0);
const leaderOf = (pl)=>{const a=Object.entries(pl).map(([k,v])=>[k,totalOf(v)]).filter(([,t])=>t>0).sort((x,y)=>y[1]-x[1]);return a.length?a[0][0]:null;};

async function refresh(){
  let data; try { data = await api("state"); } catch(e){ return; }
  const pl = data.players || {};
  Object.entries(pl).forEach(([k,v])=>{const now=totalOf(v),was=prevTotals[k];
    if(was!==undefined&&now>was&&(!state.me||k!==state.me.username)) toast(v.emoji,`${v.name} ate ${now-was} more 🌭`);
    prevTotals[k]=now;});
  const nl=leaderOf(pl);
  if(nl&&prevLeader&&nl!==prevLeader&&(!state.me||nl!==state.me.username)) toast("👑",`${pl[nl].name} took the lead!`);
  prevLeader=nl; state.players=pl; state.pics=data.pics||[]; state.events=data.events||[]; state.online=data.onlineCount||0;
  rerender();
}
function startPolling(){ if(started) return; started=true; refresh(); setInterval(refresh, 10000); }
function rerender(){ const v=state.view; if(v==="board")renderBoard();else if(v==="feed")renderFeed();else if(v==="timeline")renderTimeline();else if(v==="you")renderYou(); }

function signOut(){ localStorage.removeItem("ww_token"); localStorage.removeItem("ww_me"); state.me=null; closeModal(); route(); }

// ----------------------------- actions -----------------------------
async function logDogs(count,img){
  const me=state.me;
  try{ const data=await api("log","POST",{count,img}); state.players=data.players||{}; state.pics=data.pics||[]; state.events=data.events||[]; state.online=data.onlineCount||0; prevTotals[me.username]=totalOf(state.players[me.username]); }
  catch(e){ toast("⚠️","Could not save — is the server up?"); return false; }
  toast("🌭",`Logged ${count} for today! 🔥`);
  return true;
}

// ============================ shared chrome ============================
function header(){const live=`<div class="row" style="gap:6px"><span class="dot live"></span><span style="font-family:Anton;font-size:13px;color:var(--green)">${state.online} online</span></div>`;
  return `<div class="banner"></div>
  <header class="wrap" style="padding-top:16px;padding-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start">
    <div><h1 class="display" style="font-size:38px;color:var(--ketchup);text-shadow:2px 2px 0 var(--ink)">WIENER<br>WARS 🌭</h1>
    <p style="font-weight:700;color:var(--ink-soft);font-size:13px;margin-top:4px">The hotdog-eating championship</p></div>
    <div style="text-align:right;margin-top:4px">${live}</div>
  </header>`;}

function navbar(){const v=state.view;const n=(id,icon,label)=>`<button class="navbtn ${v===id?'active':''}" data-nav="${id}"><span style="font-size:21px">${icon}</span>${label}</button>`;
  return `<nav><div class="navinner">${n("board","🏆","BOARD")}${n("timeline","📡","TIMELINE")}
    <button class="btn fab" data-nav="log">+</button>${n("feed","📸","FEED")}${n("you",state.me?state.me.emoji:"🙂","YOU")}</div></nav>`;}
function bindNav(){document.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>show(b.dataset.nav));}
function show(view){state.view=view;
  if(view==="board")renderBoard();else if(view==="feed")renderFeed();else if(view==="log")renderLog();else if(view==="you")renderYou();else if(view==="timeline")renderTimeline();}

// ============================ AUTH ============================
// One screen with two modes: Join (needs invite key) or Log in (existing account).
function renderAuth(){
  let mode="join", emoji=EMOJIS[0], color=COLORS[0];
  const draw=()=>{
    const joining=mode==="join";
    $("app").innerHTML=`<div class="center" style="min-height:100vh;padding:18px">
      <div class="card pop" style="width:100%;max-width:400px;padding:24px">
        <div style="text-align:center"><div style="font-size:46px">🌭</div>
        <h1 class="display" style="font-size:40px;color:var(--ketchup);text-shadow:2px 2px 0 var(--ink)">WIENER WARS</h1>
        <p style="font-weight:700;color:var(--ink-soft);margin:6px 0 16px;font-size:14px">${joining?"Got the invite key? Make your eater.":"Welcome back, champ."}</p></div>
        <div class="row" style="justify-content:center;gap:18px;margin-bottom:16px">
          <button class="tab" id="tjoin" style="${joining?'color:var(--ketchup);border-bottom:3px solid var(--ketchup)':''}">Join</button>
          <button class="tab" id="tlogin" style="${!joining?'color:var(--ketchup);border-bottom:3px solid var(--ketchup)':''}">Log in</button>
        </div>
        ${joining?`<input id="key" class="input" placeholder="Invite key" style="margin-bottom:10px" />`:''}
        <input id="nm" class="input" maxlength="20" placeholder="Your name" style="margin-bottom:10px" />
        <input id="pin" class="input" inputmode="numeric" maxlength="8" placeholder="Your PIN (4–8 digits)" style="margin-bottom:${joining?'16px':'6px'};letter-spacing:4px" />
        ${joining?`<div class="display" style="font-size:15px;margin-bottom:7px">Avatar</div>
        <div id="emojis" style="display:grid;grid-template-columns:repeat(8,1fr);gap:7px;margin-bottom:14px"></div>
        <div class="display" style="font-size:15px;margin-bottom:7px">Team color</div>
        <div id="colors" style="display:flex;gap:9px;flex-wrap:wrap;margin-bottom:8px"></div>`:''}
        <p id="err" style="color:var(--ketchup);font-weight:700;font-size:13px;height:18px;text-align:center"></p>
        <button id="go" class="btn">${joining?"Enter the arena 🌭":"Log in 🔓"}</button>
      </div></div>`;
    $("tjoin").onclick=()=>{mode="join";draw();};
    $("tlogin").onclick=()=>{mode="login";draw();};
    if(joining){
      const eW=$("emojis"); EMOJIS.forEach(e=>{const b=document.createElement("button");b.textContent=e;b.style.cssText="font-size:20px;padding:6px 0;cursor:pointer;border:3px solid transparent;border-radius:12px;background:#fff";b.onclick=()=>{emoji=e;[...eW.children].forEach(c=>{c.style.background="#fff";c.style.border="3px solid transparent";c.style.boxShadow="none";});b.style.background="var(--mustard)";b.style.border="3px solid var(--ink)";b.style.boxShadow="2px 2px 0 var(--ink)";};eW.appendChild(b);}); [...eW.children].find(c=>c.textContent===emoji).click();
      const cW=$("colors"); COLORS.forEach(c=>{const b=document.createElement("button");b.dataset.c=c;b.style.cssText=`width:34px;height:34px;border-radius:50%;background:${c};cursor:pointer;border:3px solid #fff`;b.onclick=()=>{color=c;[...cW.children].forEach(x=>{x.style.border="3px solid #fff";x.style.boxShadow="none";});b.style.border="4px solid var(--ink)";b.style.boxShadow="0 0 0 2px var(--ink)";};cW.appendChild(b);}); [...cW.children].find(c=>c.dataset.c===color).click();
    }
    const go=async()=>{
      const name=($("nm").value||"").trim(), pin=($("pin").value||"").trim();
      const err=$("err"); err.textContent="";
      if(!name){err.textContent="Enter your name";return;}
      if(!/^\d{4,8}$/.test(pin)){err.textContent="PIN must be 4–8 digits";return;}
      $("go").disabled=true;
      try{
        let r;
        if(joining){ const key=($("key").value||"").trim(); if(!key){err.textContent="Enter the invite key";$("go").disabled=false;return;}
          r=await fetch("/api/signup",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key,name,pin,emoji,color})}); }
        else { r=await fetch("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,pin})}); }
        const j=await r.json();
        if(!r.ok){ err.textContent={bad_key:"Wrong invite key",name_taken:"Name taken — pick another (or log in)",bad_login:"Name or PIN is wrong",bad_pin:"PIN must be 4–8 digits",bad_name:"Enter your name"}[j.error]||"Couldn't sign in"; $("go").disabled=false; return; }
        localStorage.setItem("ww_token",j.token); state.me=j.me; ls.set("ww_me",j.me); route();
      }catch{ err.textContent="Server not reachable"; $("go").disabled=false; }
    };
    $("go").onclick=go;
    $("pin").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
  };
  draw();
}

// ============================ BOARD ============================
function renderBoard(){
  const pl=state.players, me=state.me, t=todayStr();
  const ranked=Object.entries(pl).map(([k,v])=>({username:k,...v,total:totalOf(v)})).sort((a,b)=>b.total-a.total||(a.joined||0)-(b.joined||0));
  const group=ranked.reduce((a,p)=>a+p.total,0), today=ranked.reduce((a,p)=>a+(p.days?.[t]||0),0), max=Math.max(1,...ranked.map(p=>p.total));
  const stat=(icon,val,label)=>`<div class="card" style="flex:1;padding:10px 8px;text-align:center;box-shadow:4px 4px 0 var(--ink)"><div style="font-size:18px">${icon}</div><div class="display" style="font-size:26px">${val}</div><div style="font-size:10px;font-weight:800;color:var(--ink-soft);text-transform:uppercase">${label}</div></div>`;
  const rows=ranked.map((p,i)=>{const isMe=p.username===me.username;const td=p.days?.[t]||0;
    return `<div class="card" data-player="${esc(p.username)}" style="padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;border-color:${isMe?'var(--ketchup)':'var(--ink)'};background:${isMe?'#fff4e4':'var(--cream)'}">
      <div style="position:relative;flex-shrink:0"><div class="display" style="width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;border:2.5px solid var(--ink);background:${i<3?RANK_TINT[i]:'#fff'}">${i+1}</div>${i===0&&p.total>0?'<div style="position:absolute;top:-13px;left:9px;font-size:16px">👑</div>':''}</div>
      <div style="position:relative;flex-shrink:0"><div style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;background:#fff;border:3px solid ${p.color}">${p.emoji}</div>${p.online?'<span class="dot" style="position:absolute;bottom:-1px;right:-1px"></span>':''}</div>
      <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(p.name)}${isMe?' <span style="color:var(--ketchup);font-size:12px">· you</span>':''}</div>
        <div style="height:8px;border-radius:6px;background:#eadcc0;margin-top:5px;overflow:hidden;border:1.5px solid var(--ink)"><div class="barfill" style="height:100%;border-radius:4px;width:${(p.total/max)*100}%;background:${p.color}"></div></div></div>
      <div style="text-align:right;flex-shrink:0"><div class="display" style="font-size:28px;line-height:1">${p.total}</div>${td>0?`<div style="font-size:11px;font-weight:800;color:var(--green)">+${td} today</div>`:''}</div>
    </div>`;}).join("");
  $("app").innerHTML=header()+`<main class="wrap pop">
    <div style="display:flex;gap:10px;margin:8px 0 16px">${stat("🔥",group,"Total dogs")}${stat("📈",today,"Today")}${stat("📡",state.online,"Online")}</div>
    <div class="display" style="font-size:22px;margin:4px 2px 10px">🏆 Leaderboard</div>
    ${ranked.length?`<div style="display:flex;flex-direction:column;gap:11px">${rows}</div><p style="text-align:center;color:var(--ink-soft);font-weight:700;font-size:12px;margin-top:12px">Tap anyone to see their hotdog log 👀</p>`:'<div class="card" style="padding:24px;text-align:center"><div style="font-size:34px">🌭</div><p style="font-weight:700">No dogs logged yet. Tap + to draw first blood.</p></div>'}
  </main>`+navbar(); bindNav();
  document.querySelectorAll("[data-player]").forEach(c=>c.onclick=()=>openPlayer(c.dataset.player));
}

// ---- friend detail sheet: their daily hotdog log ----
function openPlayer(username){
  const p=state.players[username]; if(!p) return;
  const days=Object.entries(p.days||{}).sort((a,b)=>a[0]<b[0]?1:-1);
  const best=days.reduce((m,[,c])=>Math.max(m,c),0);
  const total=totalOf(p);
  const log=days.length?days.map(([d,c])=>`<div class="row" style="justify-content:space-between;padding:10px 12px;border-bottom:1.5px dashed #e3d2ad"><span style="font-weight:700">${niceDate(d)}</span><span class="display" style="font-size:20px">${c} 🌭</span></div>`).join(""):'<p style="font-weight:700;text-align:center;padding:14px">Nothing logged yet.</p>';
  const stat=(v,l,col)=>`<div><div class="display" style="font-size:26px;${col?'color:'+col:''}">${v}</div><div style="font-size:10px;font-weight:800;color:var(--ink-soft)">${l}</div></div>`;
  $("modal").innerHTML=`<div class="modal" id="ov"><div class="sheet" onclick="event.stopPropagation()">
    <div class="row" style="gap:12px;margin-bottom:14px">
      <div style="position:relative;flex-shrink:0"><div style="width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;background:#fff;border:3px solid ${p.color}">${p.emoji}</div>${p.online?'<span class="dot" style="position:absolute;bottom:0;right:0"></span>':''}</div>
      <div style="flex:1"><div class="display" style="font-size:26px">${esc(p.name)}</div><div style="font-weight:700;font-size:13px;color:${p.online?'var(--green)':'var(--ink-soft)'}">${p.online?'● online now':'offline'}</div></div>
      <button class="chip" id="x" style="background:var(--cream);padding:8px 11px;cursor:pointer;font-family:Anton">✕</button>
    </div>
    <div class="row" style="gap:26px;margin:2px 4px 16px">${stat(total,"TOTAL","var(--ketchup)")}${stat(best,"BEST DAY","var(--mustard-dk)")}${stat(days.length,"DAYS IN")}</div>
    <div class="display" style="font-size:16px;margin:0 2px 8px">🌭 Daily log</div>
    <div class="card" style="padding:4px 4px;box-shadow:4px 4px 0 var(--ink)">${log}</div>
  </div></div>`;
  $("ov").onclick=closeModal; $("x").onclick=closeModal;
}
function closeModal(){ $("modal").innerHTML=""; }

// ============================ TIMELINE ============================
function renderTimeline(){
  const evs=state.events||[];
  const items=evs.map(e=>`<div class="row" style="gap:11px;padding:11px 4px;border-bottom:1.5px dashed #e3d2ad">
    <div style="width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:#fff;border:3px solid ${e.color}">${e.emoji}</div>
    <div style="flex:1;min-width:0"><div style="font-weight:800;font-size:15px">${esc(e.name)} <span style="font-weight:600;color:var(--ink-soft)">logged</span> <span class="display" style="color:var(--ketchup)">${e.count} 🌭</span>${e.hasImg?' <span title="has photo">📸</span>':''}</div>
    <div style="font-size:12px;font-weight:600;color:var(--ink-soft)">${niceDate(e.date)} · ${hhmm(e.ts)} · ${ago(e.ts)}</div></div>
  </div>`).join("");
  $("app").innerHTML=header()+`<main class="wrap pop">
    <div class="display" style="font-size:22px;margin:8px 2px 6px">📡 Community timeline</div>
    <p style="font-weight:700;color:var(--ink-soft);font-size:13px;margin:0 2px 12px">Who's been eating, and when.</p>
    ${items.length?`<div class="card" style="padding:6px 14px">${items}</div>`:'<div class="card" style="padding:24px;text-align:center;font-weight:700"><div style="font-size:34px">📡</div>Quiet for now. Be the first to log!</div>'}
  </main>`+navbar(); bindNav();
}

// ============================ LOG ============================
function renderLog(){
  let count=1, preview=null;
  const t=todayStr(); const mine=state.players[state.me.username]; const today=mine?.days?.[t]||0;
  $("app").innerHTML=header()+`<main class="wrap pop">
    <div class="row" style="gap:8px;margin:6px 0 14px"><button class="chip" id="back" style="background:var(--cream);padding:6px;cursor:pointer">✕</button><div class="display" style="font-size:24px">Log today's dogs</div></div>
    <div class="card" style="padding:20px">
      <p style="font-weight:700;color:var(--ink-soft);font-size:14px">${niceDate(t)} · logged <b style="color:var(--ketchup)">${today}</b> so far today</p>
      <div class="row" style="justify-content:center;gap:18px;margin:12px 0 6px">
        <button class="btn mustard" id="minus" style="width:56px;height:56px;border-radius:50%;font-size:28px;padding:0">−</button>
        <div class="display" id="cnt" style="font-size:74px;min-width:90px;text-align:center;color:var(--ketchup)">1</div>
        <button class="btn mustard" id="plus" style="width:56px;height:56px;border-radius:50%;font-size:28px;padding:0">+</button>
      </div>
      <p style="text-align:center;font-family:Anton;letter-spacing:.04em;margin-bottom:8px">🌭 HOTDOGS THIS ROUND</p>
      <input id="file" type="file" accept="image/*" capture="environment" class="hide" />
      <div id="photoarea"></div>
      <button class="btn" id="logit" style="margin-top:4px">✓ Log it</button>
    </div></main>`+navbar(); bindNav();
  $("back").onclick=()=>show("board");
  $("minus").onclick=()=>{count=Math.max(1,count-1);$("cnt").textContent=count;};
  $("plus").onclick=()=>{count++;$("cnt").textContent=count;};
  const pa=$("photoarea");
  const drawAdd=()=>{pa.innerHTML=`<button class="btn ghost" id="addphoto" style="margin:16px 0;display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px">📷 Add proof photo</button>`;$("addphoto").onclick=()=>$("file").click();};
  drawAdd();
  $("file").onchange=async(e)=>{const f=e.target.files[0];if(!f)return;pa.innerHTML='<p style="text-align:center;font-weight:700;margin:16px 0">Loading…</p>';preview=await compress(f);pa.innerHTML=`<div style="position:relative;margin:16px 0"><img src="${preview}" style="width:100%;border-radius:14px;border:3px solid var(--ink);display:block"><button class="chip" id="rm" style="position:absolute;top:8px;right:8px;background:var(--cream);padding:6px;cursor:pointer">✕</button></div>`;$("rm").onclick=()=>{preview=null;drawAdd();};};
  $("logit").onclick=async()=>{$("logit").disabled=true;const ok=await logDogs(count,preview);if(ok)show("board");else $("logit").disabled=false;};
}

// ============================ FEED ============================
function renderFeed(){
  const items=state.pics||[];
  const cards=items.map(it=>`<div class="card" style="overflow:hidden">
    <div class="row" style="gap:10px;padding:10px 12px"><div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;background:#fff;border:3px solid ${it.color}">${it.emoji}</div>
    <div style="flex:1"><div style="font-weight:800;font-size:15px">${esc(it.name)}</div><div style="font-size:12px;font-weight:600;color:var(--ink-soft)">${ago(it.ts)} · ${niceDate(it.date)}</div></div>
    <div class="chip" style="background:var(--mustard);padding:4px 12px;font-weight:800;font-family:Anton">${it.count} 🌭</div></div>
    ${it.img?`<img src="${it.img}" style="width:100%;display:block;border-top:3px solid var(--ink)">`:''}</div>`).join("");
  $("app").innerHTML=header()+`<main class="wrap pop">
    <div class="display" style="font-size:22px;margin:8px 2px 12px">📸 Proof feed</div>
    ${items.length?`<div style="display:flex;flex-direction:column;gap:14px">${cards}</div>`:'<div class="card" style="padding:24px;text-align:center;font-weight:700"><div style="font-size:34px">📸</div>No photos yet. Add one when you log!</div>'}
  </main>`+navbar(); bindNav();
}

// ============================ YOU ============================
function renderYou(){
  const me=state.me, p=state.players[me.username]||{};
  const total=totalOf(p), days=Object.entries(p.days||{}).sort((a,b)=>a[0]<b[0]?1:-1);
  const best=days.reduce((m,[,c])=>Math.max(m,c),0);
  const stat=(v,l,col)=>`<div><div class="display" style="font-size:30px;${col?'color:'+col:''}">${v}</div><div style="font-size:11px;font-weight:800;color:var(--ink-soft)">${l}</div></div>`;
  const log=days.length?days.map(([d,c])=>`<div class="row" style="justify-content:space-between;padding:10px 12px;border-bottom:1.5px dashed #e3d2ad"><span style="font-weight:700">${niceDate(d)}</span><span class="display" style="font-size:20px">${c} 🌭</span></div>`).join(""):'<p style="font-weight:700;text-align:center;padding:8px">Nothing logged yet — go eat!</p>';
  $("app").innerHTML=header()+`<main class="wrap pop">
    <div class="card" style="padding:20px;text-align:center;margin:8px 0 14px">
      <div style="width:74px;height:74px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;font-size:38px;background:#fff;border:4px solid ${me.color}">${me.emoji}</div>
      <h2 class="display" style="font-size:30px;margin:10px 0 2px">${esc(me.name)}</h2>
      <div class="row" style="justify-content:center;gap:22px;margin-top:10px">${stat(total,"TOTAL","var(--ketchup)")}${stat(best,"BEST DAY","var(--mustard-dk)")}${stat(days.length,"DAYS IN")}</div>
    </div>
    <div class="display" style="font-size:18px;margin:4px 2px 8px">Your daily log</div>
    <div class="card" style="padding:6px 4px">${log}</div>
    <button class="btn ghost" id="logout" style="margin-top:16px;font-size:15px">↩ Log out</button>
  </main>`+navbar(); bindNav();
  $("logout").onclick=signOut;
}

// ----------------------------- router -----------------------------
function route(){
  if(!TOKEN()||!state.me){ renderAuth(); return; }
  startPolling();
  show("board");
}
route();
</script>
</body>
</html>
